<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衛生管理システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons-webfont/3.31.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F6F9;--card:#fff;--hover:#F8FAFC;--border:#E2E8F0;--blight:#EDF2F7;--text:#1A202C;--tsec:#64748B;--tth:#94A3B8;--pri:#1B7A5A;--priL:#E6F5EF;--priD:#145E44;--ok:#059669;--okL:#D1FAE5;--warn:#D97706;--warnL:#FEF3C7;--ng:#DC2626;--ngL:#FEE2E2;--side:230px;--r:10px;--rs:6px;--sh:0 1px 3px rgba(0,0,0,.06);--sidebar:#0F2E22;--sidebar-border:#1A4433;--sidebar-hover:rgba(255,255,255,.05);--sidebar-active:rgba(27,122,90,.25)}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.app{display:flex;height:100vh}
.side{width:var(--side);flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto;z-index:100;transition:transform .25s ease}
.side-brand{padding:1.25rem 1rem;border-bottom:1px solid var(--sidebar-border)}
.side-brand h1{font-size:13px;font-weight:700;color:#E8F5EF;letter-spacing:.03em}
.side-brand p{font-size:10px;color:#6B9B84;margin-top:2px}
.nav{padding:.5rem 0;flex:1}
.nav-sec{padding:0 1rem;margin-top:1rem;margin-bottom:.25rem;font-size:9px;font-weight:700;color:#6B9B84;letter-spacing:.1em;text-transform:uppercase}
.nav-sec:first-child{margin-top:.5rem}
.ni{display:flex;align-items:center;gap:10px;padding:8px 1rem;font-size:12px;color:#94C9AE;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.ni:hover{color:#D5F1E3;background:var(--sidebar-hover)}
.ni.on{color:#fff;background:var(--sidebar-active);border-left-color:var(--pri)}
.ni i{font-size:17px;width:20px;text-align:center}
.ni .badge{margin-left:auto;font-size:9px;font-weight:700;background:#DC2626;color:#fff;padding:1px 7px;border-radius:99px;min-width:18px;text-align:center;display:none}
.ni .badge.show{display:inline-block}
.new-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#DC2626;margin-left:6px;vertical-align:middle;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.side-foot{padding:1rem;border-top:1px solid var(--sidebar-border);font-size:11px;color:#6B9B84}
.hamburger{display:none;width:36px;height:36px;border:none;background:none;cursor:pointer;padding:6px;flex-shrink:0}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);margin:5px auto;border-radius:2px;transition:all .25s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:99}
.overlay.show{display:block}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0}
.top-title{font-size:14px;font-weight:600}
.top-r{display:flex;gap:8px}
.top-r .ib{width:34px;height:34px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;color:var(--tsec);cursor:pointer;border:1px solid var(--border)}
.top-r .ib:hover{background:var(--bg)}
.cnt{flex:1;overflow-y:auto;padding:1.25rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);padding:1.25rem;margin-bottom:1rem}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.card-t{font-size:13px;font-weight:600}
.card-st{font-size:11px;color:var(--tsec)}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1rem}
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;display:flex;align-items:center;gap:12px;box-shadow:var(--sh)}
.mi{width:38px;height:38px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:18px}
.mi.bl{background:var(--priL);color:var(--pri)}.mi.gn{background:var(--okL);color:var(--ok)}.mi.am{background:var(--warnL);color:var(--warn)}.mi.rd{background:var(--ngL);color:var(--ng)}
.mb .ml{font-size:11px;color:var(--tsec)}.mb .mv{font-size:20px;font-weight:700;margin-top:1px}
table{width:100%;border-collapse:collapse}
th,td{width:1%;white-space:nowrap}
th:last-child,td:last-child{width:auto}
th{font-size:10px;font-weight:600;color:var(--tsec);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
td{padding:8px 10px;border-bottom:1px solid var(--blight);font-size:12px}
.col-btn{width:1%;white-space:nowrap}
.mob-kana{display:none}
@media(max-width:768px){.hl-st-full{display:none}.hl-st-short{display:inline-block}}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--hover)}
@media(max-width:768px){.mob-hide{display:none}.mob-vert{writing-mode:vertical-rl;text-orientation:upright;padding:4px 2px!important;font-size:9px;letter-spacing:2px;line-height:1}.mob-vert .btn{writing-mode:vertical-rl;text-orientation:upright;padding:6px 3px;font-size:9px;letter-spacing:2px;min-width:0}.mob-vert .btn i{display:none}.mob-name-wrap{white-space:normal!important}.mob-kana{display:block;font-size:8px;color:var(--tsec);line-height:1.2;margin-bottom:1px}.mob-ck-hide{display:none}}
.bs{display:inline-block;font-size:10px;font-weight:500;padding:2px 9px;border-radius:99px}
.bg{background:var(--okL);color:var(--ok)}.br{background:var(--ngL);color:var(--ng)}.bx{background:#F1F5F9;color:var(--tsec)}
.btn{font-family:inherit;font-size:12px;font-weight:500;padding:6px 14px;border-radius:var(--rs);cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg)}.btn:disabled{opacity:.4;cursor:not-allowed}
.bp{background:var(--pri);border-color:var(--pri);color:#fff}.bp:hover{background:var(--priD)}
.bd{background:#DC2626;border-color:#DC2626;color:#fff}.bd:hover{background:#B91C1C}
.bs2{font-size:11px;padding:4px 10px}
.bi{display:inline-flex;align-items:center;gap:5px}
.ck{width:16px;height:16px;cursor:pointer;accent-color:var(--pri)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgr{display:flex;flex-direction:column;gap:3px}
.fgr label{font-size:11px;font-weight:500;color:var(--tsec)}
.fgr input,.fgr select{font-family:inherit;font-size:12px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);outline:none;width:100%}
.fgr input:focus,.fgr select:focus{border-color:var(--pri)}
.filter-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.fb{font-family:inherit;font-size:11px;padding:4px 12px;border-radius:99px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--tsec);transition:all .15s}
.fb:hover{border-color:var(--pri);color:var(--pri)}
.fb.on{background:var(--pri);border-color:var(--pri);color:#fff}
.page{display:none}.page.on{display:block}
.ld{text-align:center;padding:2rem;color:var(--tsec);font-size:12px}
.ld i{font-size:22px;display:block;margin-bottom:6px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;top:16px;right:16px;padding:10px 18px;border-radius:var(--rs);color:#fff;font-size:12px;font-weight:500;z-index:9999;opacity:0;transform:translateY(-10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}.toast.ok{background:var(--ok)}.toast.err{background:var(--ng)}
.sbar{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--blight)}.sbar:last-child{border-bottom:none}
.sbar .sl{width:110px;font-size:11px;color:var(--tsec);flex-shrink:0}.sbar .sw{flex:1;background:var(--blight);border-radius:99px;height:7px}.sbar .sf{height:7px;border-radius:99px;transition:width .5s}.sbar .sv{width:45px;text-align:right;font-size:13px;font-weight:700;flex-shrink:0}
.dqr{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--blight);font-size:12px}.dqr:last-child{border-bottom:none}
.dqn{width:32px;font-size:10px;color:var(--tth);font-weight:600;flex-shrink:0}.dqt{flex:1;line-height:1.5}
.dqa{width:100px;flex-shrink:0;text-align:center;font-size:10px;font-weight:600;padding:3px 6px;border-radius:99px}
.pdf-frame{width:100%;height:500px;border:1px solid var(--border);border-radius:var(--r)}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:var(--r);padding:1.5rem;width:90%;max-width:480px;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.modal .fg{grid-template-columns:1fr 1fr}
@media(max-width:500px){.modal .fg{grid-template-columns:1fr}}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-t{font-size:14px;font-weight:600}
.modal-close{width:28px;height:28px;border:none;background:none;cursor:pointer;font-size:18px;color:var(--tsec);border-radius:50%}
.modal-close:hover{background:var(--bg)}
@media(max-width:768px){.side{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%)}.side.open{transform:translateX(0)}.hamburger{display:block}.fg{grid-template-columns:1fr}.mg{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="app">
<div class="side" id="sidebar">
  <div class="side-brand"><h1>衛生管理システム</h1><p>Health Management</p></div>
  <div class="nav">
    <div class="nav-sec">概要</div>
    <div class="ni on" onclick="go('dash',this)"><i class="ti ti-layout-dashboard"></i>ダッシュボード</div>
    <div class="nav-sec">ストレスチェック</div>
    <div class="ni" onclick="go('sc',this)"><i class="ti ti-list-check"></i>結果一覧<span class="badge" id="badge-sc"></span></div>
    <div class="nav-sec">健康診断</div>
    <div class="ni" onclick="go('health',this)"><i class="ti ti-stethoscope"></i>提出状況<span class="badge" id="badge-hl"></span></div>
    <div class="nav-sec">社員管理</div>
    <div class="ni" onclick="go('emp',this)"><i class="ti ti-users"></i>社員一覧</div>
  </div>
  <div class="side-foot">衛生管理システム v1.1</div>
</div>
<div class="main">
  <div class="top"><button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button><div class="top-title" id="tt">ダッシュボード</div><div class="top-r"><div class="ib" title="更新" onclick="doRefresh()"><i class="ti ti-refresh"></i></div></div></div>
  <div class="cnt">
    <!-- DASH -->
    <div class="page on" id="p-dash">
      <div class="mg">
        <div class="mc"><div class="mi bl"><i class="ti ti-clipboard-check"></i></div><div class="mb"><div class="ml">チェック実施者</div><div class="mv" id="d-total">—</div></div></div>
        <div class="mc"><div class="mi rd"><i class="ti ti-alert-triangle"></i></div><div class="mb"><div class="ml">高ストレス者</div><div class="mv" style="color:var(--ng)" id="d-high">—</div></div></div>
        <div class="mc"><div class="mi am"><i class="ti ti-percentage"></i></div><div class="mb"><div class="ml">高ストレス割合</div><div class="mv" style="color:var(--warn)" id="d-rate">—</div></div></div>
        <div class="mc"><div class="mi gn"><i class="ti ti-stethoscope"></i></div><div class="mb"><div class="ml">健康診断提出者</div><div class="mv" style="color:var(--ok)" id="d-health">—</div></div></div>
      </div>
      <div class="card" id="dash-new" style="display:none"><div class="card-h"><span class="card-t"><i class="ti ti-bell-ringing" style="color:var(--ng)"></i> 新着通知</span></div><div id="dash-new-body"></div></div>
      <div class="card"><div class="card-h"><span class="card-t">部署別状況</span></div><div id="dash-dept"><div class="ld"><i class="ti ti-loader-2"></i></div></div></div>
      <div class="card"><div class="card-h"><span class="card-t">高ストレス判定基準</span></div><p style="font-size:12px;color:var(--tsec);line-height:1.8"><strong style="color:var(--text)">パターン1：</strong>B（ストレス反応）≧ 77<br><strong style="color:var(--text)">パターン2：</strong>A + C ≧ 76 かつ B ≧ 63</p></div>
    </div>
    <!-- SC -->
    <div class="page" id="p-sc">
      <div id="sc-list"><div class="card"><div class="card-h"><span class="card-t">ストレスチェック結果一覧</span><button class="btn bs2 bi" onclick="loadSC()"><i class="ti ti-refresh" style="font-size:13px"></i>更新</button></div>
        <div class="filter-row"><button class="fb on" onclick="fSC('all',this)">すべて</button><button class="fb" onclick="fSC('良好',this)">良好</button><button class="fb" onclick="fSC('高ストレス',this)">高ストレス</button></div>
        <div id="sc-tbl"><div class="ld"><i class="ti ti-loader-2"></i></div></div>
      </div></div>
      <div id="sc-detail" style="display:none"></div>
    </div>
    <!-- HEALTH -->
    <div class="page" id="p-health">
      <div id="hl-card"><div class="card"><div class="card-h"><span class="card-t">健康診断 提出状況</span><div style="display:flex;gap:6px"><button class="btn bs2 bi bd" id="hl-del-btn" onclick="deleteSelected()" style="display:none"><i class="ti ti-trash" style="font-size:13px"></i><span id="hl-del-cnt">0</span>件を削除</button><button class="btn bs2 bi" onclick="loadHL()"><i class="ti ti-refresh" style="font-size:13px"></i>更新</button></div></div>
        <div style="display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;align-items:end">
          <div class="fgr" style="min-width:120px"><label>提出状況</label><select id="hl-f-status" onchange="renderHL()" style="font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--rs)"><option value="">すべて</option><option value="提出済">提出済</option><option value="未提出">未提出</option></select></div>
          <div class="fgr" style="min-width:140px"><label>部署</label><select id="hl-f-dept" onchange="renderHL()" style="font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--rs)"><option value="">すべて</option><option>名古屋FW</option><option>名古屋TF</option><option>名古屋TF ANNEXE 分室</option><option>東京FW</option><option>メディアリサーチ事業部 ANNEXE</option><option>フード・リテール事業部 Cache-Cache</option><option>監査役</option><option>JDS</option></select></div>
          <div class="fgr" style="min-width:140px"><label>雇用形態</label><select id="hl-f-type" onchange="renderHL()" style="font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--rs)"><option value="">すべて</option><option>正社員</option><option>契約社員</option><option>パート・アルバイト</option><option>派遣社員</option><option>嘱託社員</option><option>業務委託</option></select></div>
          <button class="btn bs2 bi" onclick="resetHLFilter()" style="height:32px"><i class="ti ti-filter-off" style="font-size:13px"></i>リセット</button>
        </div>
        <div id="hl-summary" style="margin-bottom:10px"></div>
        <div id="hl-tbl"><div class="ld"><i class="ti ti-loader-2"></i></div></div>
      </div></div>
      <div id="hl-pdf" style="display:none"></div>
    </div>
    <!-- EMP -->
    <div class="page" id="p-emp">
      <div id="emp-list"><div class="card"><div class="card-h"><span class="card-t">社員一覧</span><div style="display:flex;gap:6px"><button class="btn bs2 bp bi" onclick="showEmpModal()"><i class="ti ti-user-plus" style="font-size:13px"></i>新規登録</button><button class="btn bs2 bi" onclick="loadEmp()"><i class="ti ti-refresh" style="font-size:13px"></i>更新</button></div></div>
        <div class="filter-row"><button class="fb on" onclick="fEmp('all',this)">すべて</button><button class="fb" onclick="fEmp('dept',this)">部署</button><button class="fb" onclick="fEmp('type',this)">雇用形態</button></div>
        <div id="emp-filter-sub" style="display:none;margin-bottom:1rem"><select id="emp-filter-sel" onchange="renderEmp()" style="font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--rs)"></select></div>
        <div id="emp-tbl"><div class="ld"><i class="ti ti-loader-2"></i></div></div>
      </div></div>
    </div>
  </div>
</div>
</div>
<!-- EMPLOYEE MODAL -->
<div class="modal-bg" id="emp-modal"><div class="modal"><div class="modal-h"><span class="modal-t" id="emp-modal-title">社員登録</span><button class="modal-close" onclick="closeEmpModal()">&times;</button></div>
<div class="fg"><div class="fgr"><label>氏名 <span style="color:var(--ng)">*</span></label><input type="text" id="emp-name" placeholder="山田太郎"></div>
<div class="fgr"><label>フリガナ <span style="color:var(--ng)">*</span></label><input type="text" id="emp-kana" placeholder="ヤマダタロウ"></div>
<div class="fgr"><label>所属部署 <span style="color:var(--ng)">*</span></label><select id="emp-dept"><option value="">選択</option><option>名古屋FW</option><option>名古屋TF</option><option>名古屋TF ANNEXE 分室</option><option>東京FW</option><option>メディアリサーチ事業部 ANNEXE</option><option>フード・リテール事業部 Cache-Cache</option><option>監査役</option><option>JDS</option></select></div>
<div class="fgr"><label>雇用形態 <span style="color:var(--ng)">*</span></label><select id="emp-type"><option value="">選択</option><option>正社員</option><option>契約社員</option><option>パート・アルバイト</option><option>派遣社員</option><option>嘱託社員</option><option>業務委託</option></select></div></div>
<p id="emp-err" style="font-size:11px;color:var(--ng);margin-top:8px;display:none"></p>
<div style="display:flex;gap:8px;margin-top:1rem;justify-content:flex-end"><button class="btn" onclick="closeEmpModal()">キャンセル</button><button class="btn bp" id="emp-save-btn" onclick="saveEmp()">登録</button></div>
</div></div>
<div class="toast" id="toast"></div>
<script>
var GAS='https://script.google.com/macros/s/AKfycbyYoUJgpvHLgbhjMdBd7EksLSD35CaP_uNVCHuLbH38LXhjhVIj0_XU6cCjK2xe0luy/exec';
var scD=[],hlD=[],empD=[],scF='all',empFType='all';
var DEPTS=['名古屋FW','名古屋TF','名古屋TF ANNEXE 分室','東京FW','メディアリサーチ事業部 ANNEXE','フード・リテール事業部 Cache-Cache','監査役','JDS'];
var ETYPES=['正社員','契約社員','パート・アルバイト','派遣社員','嘱託社員','業務委託'];
var titles={'dash':'ダッシュボード','sc':'結果一覧','health':'健康診断 提出状況','emp':'社員管理'};
function toggleMenu(){var s=document.getElementById('sidebar');var o=document.getElementById('overlay');var h=document.getElementById('hamburger');s.classList.toggle('open');o.classList.toggle('show');h.classList.toggle('open');}
function closeMenu(){var s=document.getElementById('sidebar');var o=document.getElementById('overlay');var h=document.getElementById('hamburger');s.classList.remove('open');o.classList.remove('show');h.classList.remove('open');}
function go(id,el){closeMenu();document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});document.getElementById('p-'+id).classList.add('on');document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('on');});if(el)el.classList.add('on');document.getElementById('tt').textContent=titles[id]||'';if(id==='dash')loadDash();if(id==='sc')loadSC();if(id==='health')loadHL();if(id==='emp')loadEmp();}
function doRefresh(){var a=document.querySelector('.page.on');if(a){var id=a.id.replace('p-','');go(id,document.querySelector('.ni.on'));}toast('更新しました','ok');}
function gGet(a,cb){if(!GAS)return;fetch(GAS+'?action='+a).then(function(r){return r.json();}).then(cb).catch(function(){toast('通信エラー','err');});}
function gPost(d,cb){if(!GAS)return;fetch(GAS,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(d)}).then(function(r){return r.json();}).then(cb).catch(function(){toast('通信エラー','err');});}
function toast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast '+(t||'ok')+' show';setTimeout(function(){e.className='toast';},3000);}
// NEW BADGE
function getLastSeen(key){return localStorage.getItem('health_seen_'+key)||'';}

iv></div>';h+=asec('A — あなたの仕事について',d.aSum,68,'A',17,qAL,aA,d.answers);h+=asec('B — 最近1か月の状態',d.bSum,116,'B',29,qBL,aB,d.answers);h+=asec('C — 周りの方々について',d.cSum,36,'C',9,qCL,aC,d.answers);h+=asec('D — 満足度',d.dSum,8,'D',2,qDL,aD,d.answers);dv.innerHTML=h;});}

function mergeHL(emps,records){
hlD=records;
var submitted={};
records.forEach(function(r){
  if(!submitted[r.name]){submitted[r.name]=r;}
  else if(String(r.date)>String(submitted[r.name].date)){submitted[r.name]=r;}
});
hlMerged=[];
emps.forEach(function(e){
  var s=submitted[e.name];
  hlMerged.push({name:e.name,kana:e.kana,dept:e.dept,employType:e.employType,
    status:s?'提出済':'未提出',date:s?s.date:'',fileId:s?s.fileId:'',fileName:s?s.fileName:''});
});
records.forEach(function(r){
  var found=emps.some(function(e){return e.name===r.name;});
  if(!found&&!hlMerged.some(function(m){return m.name===r.name;})){
    hlMerged.push({name:r.name,kana:'',dept:r.dept,employType:'',status:'提出済',date:r.date,fileId:r.fileId,fileName:r.fileName});
  }
});
renderHL();}

function editEmp(ri){var r=empD.find(function(e){return e.rowIndex===ri;});if(!r)return;empEditRow=ri;document.getElementById('emp-modal-title').textContent='社員編集';document.getElementById('emp-name').value=r.name;document.getElementById('emp-kana').value=r.kana;document.getElementById('emp-dept').value=r.dept;document.getElementById('emp-type').value=r.employType;document.getElementById('emp-err').style.display='none';document.getElementById('emp-save-btn').textContent='更新';document.getElementById('emp-modal').classList.add('show');}
function closeEmpModal(){document.getElementById('emp-modal').classList.remove('show');}
function saveEmp(){var name=document.getElementById('emp-name').value.trim();var kana=document.getElementById('emp-kana').value.trim();var dept=document.getElementById('emp-dept').value;var etype=document.getElementById('emp-type').value;var err=document.getElementById('emp-err');if(!name||!kana||!dept||!etype){err.textContent='すべての項目を入力してください';err.style.display='block';return;}err.style.display='none';var btn=document.getElementById('emp-save-btn');btn.disabled=true;btn.textContent='保存中...';if(empEditRow!==null){gPost({action:'updateEmployee',rowIndex:empEditRow,name:name,kana:kana,dept:dept,employType:etype},function(d){btn.disabled=false;if(d.success){toast(d.message,'ok');closeEmpModal();loadEmp();}else{toast('エラー','err');btn.textContent='更新';}});}else{gPost({action:'registerEmployee',name:name,kana:kana,dept:dept,employType:etype},function(d){btn.disabled=false;if(d.success){toast(d.message,'ok');closeEmpModal();loadEmp();}else{toast('エラー','err');btn.textContent='登録';}});}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
(function(){loadDash();checkNewAll();})();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衛生管理システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons-webfont/3.31.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F6F9;--card:#fff;--hover:#F8FAFC;--border:#E2E8F0;--blight:#EDF2F7;--text:#1A202C;--tsec:#64748B;--tth:#94A3B8;--pri:#2563EB;--priL:#DBEAFE;--priD:#1D4ED8;--ok:#059669;--okL:#D1FAE5;--warn:#D97706;--warnL:#FEF3C7;--ng:#DC2626;--ngL:#FEE2E2;--side:230px;--r:10px;--rs:6px;--sh:0 1px 3px rgba(0,0,0,.06)}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.app{display:flex;height:100vh}
.side{width:var(--side);flex-shrink:0;background:#0F172A;display:flex;flex-direction:column;overflow-y:auto}
.side-brand{padding:1.25rem 1rem;border-bottom:1px solid #1E293B}
.side-brand h1{font-size:13px;font-weight:700;color:#F1F5F9;letter-spacing:.03em}
.side-brand p{font-size:10px;color:#475569;margin-top:2px}
.nav{padding:.5rem 0;flex:1}
.nav-sec{padding:0 1rem;margin-top:1rem;margin-bottom:.25rem;font-size:9px;font-weight:700;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.nav-sec:first-child{margin-top:.5rem}
.ni{display:flex;align-items:center;gap:10px;padding:8px 1rem;font-size:12px;color:#94A3B8;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.ni:hover{color:#E2E8F0;background:rgba(255,255,255,.03)}
.ni.on{color:#fff;background:rgba(37,99,235,.15);border-left-color:var(--pri)}
.ni i{font-size:17px;width:20px;text-align:center}
.side-foot{padding:1rem;border-top:1px solid #1E293B;font-size:11px;color:#475569}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0}
.top-title{font-size:14px;font-weight:600}
.top-r{display:flex;gap:8px}
.top-r .ib{width:34px;height:34px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;color:var(--tsec);cursor:pointer;border:1px solid var(--border)}
.top-r .ib:hover{background:var(--bg)}
.cnt{flex:1;overflow-y:auto;padding:1.25rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);padding:1.25rem;margin-bottom:1rem}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.card-t{font-size:13px;font-weight:600}
.card-st{font-size:11px;color:var(--tsec)}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1rem}
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;display:flex;align-items:center;gap:12px;box-shadow:var(--sh)}
.mi{width:38px;height:38px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:18px}
.mi.bl{background:var(--priL);color:var(--pri)}.mi.gn{background:var(--okL);color:var(--ok)}.mi.am{background:var(--warnL);color:var(--warn)}.mi.rd{background:var(--ngL);color:var(--ng)}
.mb .ml{font-size:11px;color:var(--tsec)}.mb .mv{font-size:20px;font-weight:700;margin-top:1px}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;color:var(--tsec);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
td{padding:8px 10px;border-bottom:1px solid var(--blight);font-size:12px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--hover)}
.bs{display:inline-block;font-size:10px;font-weight:500;padding:2px 9px;border-radius:99px}
.bg{background:var(--okL);color:var(--ok)}.br{background:var(--ngL);color:var(--ng)}.bx{background:#F1F5F9;color:var(--tsec)}
.btn{font-family:inherit;font-size:12px;font-weight:500;padding:6px 14px;border-radius:var(--rs);cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg)}.btn:disabled{opacity:.4;cursor:not-allowed}
.bp{background:var(--pri);border-color:var(--pri);color:#fff}.bp:hover{background:var(--priD)}
.bs2{font-size:11px;padding:4px 10px}
.bi{display:inline-flex;align-items:center;gap:5px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgr{display:flex;flex-direction:column;gap:3px}
.fgr label{font-size:11px;font-weight:500;color:var(--tsec)}
.fgr input,.fgr select{font-family:inherit;font-size:12px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);outline:none}
.fgr input:focus,.fgr select:focus{border-color:var(--pri)}
.filter-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.fb{font-family:inherit;font-size:11px;padding:4px 12px;border-radius:99px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--tsec);transition:all .15s}
.fb:hover{border-color:var(--pri);color:var(--pri)}
.fb.on{background:var(--pri);border-color:var(--pri);color:#fff}
.page{display:none}.page.on{display:block}
.ld{text-align:center;padding:2rem;color:var(--tsec);font-size:12px}
.ld i{font-size:22px;display:block;margin-bottom:6px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;top:16px;right:16px;padding:10px 18px;border-radius:var(--rs);color:#fff;font-size:12px;font-weight:500;z-index:9999;opacity:0;transform:translateY(-10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}.toast.ok{background:var(--ok)}.toast.err{background:var(--ng)}
.sbar{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--blight)}.sbar:last-child{border-bottom:none}
.sbar .sl{width:110px;font-size:11px;color:var(--tsec);flex-shrink:0}.sbar .sw{flex:1;background:var(--blight);border-radius:99px;height:7px}.sbar .sf{height:7px;border-radius:99px;transition:width .5s}.sbar .sv{width:45px;text-align:right;font-size:13px;font-weight:700;flex-shrink:0}
.dqr{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--blight);font-size:12px}.dqr:last-child{border-bottom:none}
.dqn{width:32px;font-size:10px;color:var(--tth);font-weight:600;flex-shrink:0}.dqt{flex:1;line-height:1.5}
.dqa{width:100px;flex-shrink:0;text-align:center;font-size:10px;font-weight:600;padding:3px 6px;border-radius:99px}
.pdf-frame{width:100%;height:500px;border:1px solid var(--border);border-radius:var(--r)}
.setup-box{background:var(--bg);border-radius:var(--r);padding:1rem;margin-bottom:1rem;font-size:12px;line-height:2}
@media(max-width:768px){.side{display:none}.fg{grid-template-columns:1fr}.mg{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
<div class="side">
  <div class="side-brand"><h1>衛生管理システム</h1><p>Health Management</p></div>
  <div class="nav">
    <div class="nav-sec">概要</div>
    <div class="ni on" onclick="go('dash',this)"><i class="ti ti-layout-dashboard"></i>ダッシュボード</div>
    <div class="nav-sec">ストレスチェック</div>
    <div class="ni" onclick="go('sc-results',this)"><i class="ti ti-list-check"></i>結果一覧</div>
    <div class="ni" onclick="go('sc-detail',this)"><i class="ti ti-file-analytics"></i>回答詳細</div>
    <div class="nav-sec">健康診断</div>
    <div class="ni" onclick="go('health',this)"><i class="ti ti-stethoscope"></i>提出状況</div>
  </div>
  <div class="side-foot">衛生管理システム v1.0</div>
</div>
<div class="main">
  <div class="top"><div class="top-title" id="tt">ダッシュボード</div><div class="top-r"><div class="ib" title="更新" onclick="doRefresh()"><i class="ti ti-refresh"></i></div></div></div>
  <div class="cnt">
    <!-- DASH -->
    <div class="page on" id="p-dash">
      <div class="mg">
        <div class="mc"><div class="mi bl"><i class="ti ti-clipboard-check"></i></div><div class="mb"><div class="ml">チェック実施者</div><div class="mv" id="d-total">—</div></div></div>
        <div class="mc"><div class="mi rd"><i class="ti ti-alert-triangle"></i></div><div class="mb"><div class="ml">高ストレス者</div><div class="mv" style="color:var(--ng)" id="d-high">—</div></div></div>
        <div class="mc"><div class="mi am"><i class="ti ti-percentage"></i></div><div class="mb"><div class="ml">高ストレス割合</div><div class="mv" style="color:var(--warn)" id="d-rate">—</div></div></div>
        <div class="mc"><div class="mi gn"><i class="ti ti-stethoscope"></i></div><div class="mb"><div class="ml">健康診断提出者</div><div class="mv" style="color:var(--ok)" id="d-health">—</div></div></div>
      </div>
      <div class="card"><div class="card-h"><span class="card-t">部署別状況</span></div><div id="dash-dept"><div class="ld"><i class="ti ti-loader-2"></i></div></div></div>
      <div class="card"><div class="card-h"><span class="card-t">高ストレス判定基準</span></div><p style="font-size:12px;color:var(--tsec);line-height:1.8"><strong style="color:var(--text)">パターン1：</strong>B（ストレス反応）≧ 77<br><strong style="color:var(--text)">パターン2：</strong>A + C ≧ 76 かつ B ≧ 63</p></div>
    </div>
    <!-- SC RESULTS -->
    <div class="page" id="p-sc-results">
      <div class="card"><div class="card-h"><span class="card-t">ストレスチェック結果一覧</span><button class="btn bs2 bi" onclick="loadSC()"><i class="ti ti-refresh" style="font-size:13px"></i>更新</button></div>
        <div class="filter-row"><button class="fb on" onclick="fSC('all',this)">すべて</button><button class="fb" onclick="fSC('良好',this)">良好</button><button class="fb" onclick="fSC('高ストレス',this)">高ストレス</button></div>
        <div id="sc-tbl"><div class="ld"><i class="ti ti-loader-2"></i></div></div>
      </div>
    </div>
    <!-- SC DETAIL -->
    <div class="page" id="p-sc-detail">
      <div id="dl-card"><div class="card"><div class="card-h"><span class="card-t">回答詳細</span><button class="btn bs2 bi" onclick="loadDL()"><i class="ti ti-refresh" style="font-size:13px"></i>更新</button></div>
        <div class="filter-row"><button class="fb on" onclick="fDL('all',this)">すべて</button><button class="fb" onclick="fDL('良好',this)">良好</button><button class="fb" onclick="fDL('高ストレス',this)">高ストレス</button></div>
        <div id="dl-tbl"><div class="ld"><i class="ti ti-loader-2"></i></div></div>
      </div></div>
      <div id="dv" style="display:none"></div>
    </div>
    <!-- HEALTH -->
    <div class="page" id="p-health">
      <div id="hl-card"><div class="card"><div class="card-h"><span class="card-t">健康診断 提出状況</span><button class="btn bs2 bi" onclick="loadHL()"><i class="ti ti-refresh" style="font-size:13px"></i>更新</button></div>
        <div class="filter-row"><button class="fb on" onclick="fHL('all',this)">すべて</button><button class="fb" onclick="fHL('dept',this)">部署で絞り込み</button></div>
        <div id="hl-dept" style="display:none;margin-bottom:1rem"><select id="hl-dept-sel" onchange="renderHL()" style="font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--rs)"><option value="">すべての部署</option><option>名古屋FW</option><option>名古屋TF</option><option>名古屋TF ANNEXE 分室</option><option>東京FW</option><option>メディアリサーチ事業部 ANNEXE</option><option>フード・リテール事業部 Cache-Cache</option><option>監査役</option><option>JDS</option></select></div>
        <div id="hl-tbl"><div class="ld"><i class="ti ti-loader-2"></i></div></div>
      </div></div>
      <div id="hl-pdf" style="display:none"></div>
    </div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
// --- 修正版 JavaScript 全体 ---
// 1. GAS URLの固定
var GAS = 'https://script.google.com/macros/s/AKfycbyYoUJgpvHLgbhjMdBd7EksLSD35CaP_uNVCHuLbH38LXhjhVIj0_XU6cCjK2xe0luy/exec';

// 2. データのキャッシュ変数
var cache = {
  dash: null,      // ダッシュボード用
  sc: null,        // ストレスチェック・回答詳細一覧用
  hl: null,        // 健康診断用
  details: {}      // 個別の回答詳細（行番号をキーに保存）
};

// 3. タイトル定義から「接続設定」を削除
var titles = {
  'dash': 'ダッシュボード',
  'sc-results': '結果一覧',
  'sc-detail': '回答詳細',
  'health': '健康診断 提出状況'
};

var scD = [], hlD = [], scF = 'all', dlF = 'all';

// --- ページ切り替え制御（キャッシュ対応） ---
function go(id, el) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('on'); });
  var targetPage = document.getElementById('p-' + id);
  if(targetPage) targetPage.classList.add('on');
  
  document.querySelectorAll('.ni').forEach(function(n) { n.classList.remove('on'); });
  if (el) el.classList.add('on');
  
  document.getElementById('tt').textContent = titles[id] || '';

  // 各ページのデータ読み込み（キャッシュがあれば即表示）
  if (id === 'dash') {
    cache.dash ? renderDash(cache.dash) : loadDash();
  } else if (id === 'sc-results') {
    cache.sc ? renderSC() : loadSC();
  } else if (id === 'sc-detail') {
    // リストを表示（一覧に戻る際もキャッシュから即時復帰）
    document.getElementById('dl-card').style.display = 'block';
    document.getElementById('dv').style.display = 'none';
    cache.sc ? renderDL() : loadDL();
  } else if (id === 'health') {
    cache.hl ? renderHL() : loadHL();
  }
}

// --- 更新ボタン（キャッシュをクリアして再取得） ---
function doRefresh() {
  var a = document.querySelector('.page.on');
  if (a) {
    var id = a.id.replace('p-', '');
    // 現在のページのキャッシュだけ消して再取得
    if (id === 'dash') cache.dash = null;
    if (id === 'sc-results' || id === 'sc-detail') { cache.sc = null; cache.details = {}; }
    if (id === 'health') cache.hl = null;
    
    go(id, document.querySelector('.ni.on'));
  }
  toast('最新の情報に更新しました', 'ok');
}

// --- 通信共通関数 ---
function gGet(a, cb) {
  fetch(GAS + '?action=' + a)
    .then(function(r) { return r.json(); })
    .then(cb)
    .catch(function(e) { toast('通信エラーが発生しました', 'err'); });
}

// --- 各データのロード処理（キャッシュ保存を追加） ---
function loadDash() {
  document.getElementById('dash-dept').innerHTML = '<div class="ld"><i class="ti ti-loader-2"></i></div>';
  gGet('getDashboard', function(d) {
    if (!d.success) return;
    cache.dash = d;
    renderDash(d);
  });
}

function loadSC() {
  document.getElementById('sc-tbl').innerHTML = '<div class="ld"><i class="ti ti-loader-2"></i></div>';
  gGet('getStressResults', function(d) {
    if (!d.success) return;
    scD = d.results;
    cache.sc = d.results;
    renderSC();
  });
}

function loadDL() {
  document.getElementById('dl-tbl').innerHTML = '<div class="ld"><i class="ti ti-loader-2"></i></div>';
  gGet('getStressResults', function(d) {
    if (!d.success) return;
    scD = d.results;
    cache.sc = d.results;
    renderDL();
  });
}

function loadHL() {
  document.getElementById('hl-tbl').innerHTML = '<div class="ld"><i class="ti ti-loader-2"></i></div>';
  gGet('getHealthRecords', function(d) {
    if (!d.success) return;
    hlD = d.records;
    cache.hl = d.records;
    renderHL();
  });
}

// --- 個別の詳細表示（ここもキャッシュ化） ---
function vd(ri) {
  document.getElementById('dl-card').style.display = 'none';
  var dv = document.getElementById('dv');
  dv.style.display = 'block';
  
  // すでに取得済みの詳細データがあればそれを使う
  if (cache.details[ri]) {
    renderDetailView(cache.details[ri]);
    return;
  }

  dv.innerHTML = '<div class="ld"><i class="ti ti-loader-2"></i></div>';
  gGet('getStressDetail&row=' + ri, function(data) {
    if (!data.success) { toast('エラー', 'err'); return; }
    cache.details[ri] = data.detail; // 詳細もキャッシュ
    renderDetailView(data.detail);
  });
}

// 表示用関数を分離（vdから呼び出す）
function renderDetailView(d) {
  var dv = document.getElementById('dv');
  var bc = d.level === '良好' ? 'bg' : 'br';
  var dt = d.date ? String(d.date).substring(0, 19) : '—';
  
  var h = '<button class="btn bs2 bi" onclick="bdl()" style="margin-bottom:1rem"><i class="ti ti-arrow-left" style="font-size:13px"></i>一覧に戻る</button>';
// DETAIL VIEW
var qAL=['非常にたくさんの仕事をしなければならない','時間内に仕事が処理しきれない','一生懸命働かなければならない','かなり注意を集中する必要がある','高度の知識や技術が必要なむずかしい仕事だ','勤務時間中はいつも仕事のことを考えていなければならない','からだを大変よく使う仕事だ','自分のペースで仕事ができる','自分で仕事の順番・やり方を決めることができる','職場の仕事の方針に自分の意見を反映できる','自分の技能や知識を仕事で使うことが少ない','私の部署内で意見のくい違いがある','私の部署と他の部署とはうまが合わない','私の職場の雰囲気は友好的である','私の職場の作業環境（騒音、照明、温度、換気など）はよくない','仕事の内容は自分にあっている','働きがいのある仕事だ'];
var qBL=['活気がわいてくる','元気がいっぱいだ','生き生きする','怒りを感じる','内心腹立たしい','イライラしている','ひどく疲れた','へとへとだ','だるい','気がはりつめている','不安だ','落ち着かない','ゆううつだ','何をするのも面倒だ','物事に集中できない','気分が晴れない','仕事が手につかない','悲しいと感じる','めまいがする','体のふしぶしが痛む','頭が重かったり頭痛がする','首筋や肩がこる','腰が痛い','目が疲れる','動悸や息切れがする','胃腸の具合が悪い','食欲がない','便秘や下痢をする','よく眠れない'];
var qCL=['上司と気軽に話せる','同僚と気軽に話せる','家族・友人と気軽に話せる','上司が頼りになる','同僚が頼りになる','家族・友人が頼りになる','上司が相談にのってくれる','同僚が相談にのってくれる','家族・友人が相談にのってくれる'];
var qDL=['仕事に満足だ','家庭生活に満足だ'];
var aA=['—','そうだ','まあそうだ','ちがう','かなりちがう'],aB=['—','ほとんどなかった','ときどきあった','しばしばあった','ほとんどいつもあった'],aC=['—','非常に','かなり','多少','全くない'],aD=['—','満足','まあ満足','やや不満','不満足'];
function vd(ri){document.getElementById('dl-card').style.display='none';var dv=document.getElementById('dv');dv.style.display='block';dv.innerHTML='<div class="ld"><i class="ti ti-loader-2"></i></div>';gGet('getStressDetail&row='+ri,function(data){if(!data.success){toast('エラー','err');return;}var d=data.detail;var bc=d.level==='良好'?'bg':'br';var dt=d.date?String(d.date).substring(0,19):'—';var h='<button class="btn bs2 bi" onclick="bdl()" style="margin-bottom:1rem"><i class="ti ti-arrow-left" style="font-size:13px"></i>一覧に戻る</button>';h+='<div class="card"><div class="card-h"><span class="card-t"><i class="ti ti-user" style="color:var(--pri)"></i> '+d.name+'</span><span class="bs '+bc+'">'+d.level+'</span></div><div class="fg"><div class="fgr"><label>フリガナ</label><div style="font-size:12px">'+(d.kana||'—')+'</div></div><div class="fgr"><label>所属部署</label><div style="font-size:12px">'+(d.dept||'—')+'</div></div><div class="fgr"><label>性別</label><div style="font-size:12px">'+(d.sex||'—')+'</div></div><div class="fgr"><label>実施日時</label><div style="font-size:12px">'+dt+'</div></div></div></div>';h+='<div class="card"><div class="card-h"><span class="card-t">セクション別スコア</span><span class="card-st">合計: '+d.total+'</span></div>';h+=sb('A 仕事要因',d.aSum,68,'var(--pri)');h+=sb('B ストレス反応',d.bSum,116,d.bSum>=77?'var(--ng)':d.bSum>=63?'var(--warn)':'var(--pri)');h+=sb('C サポート',d.cSum,36,'var(--ok)');h+=sb('D 満足度',d.dSum,8,'#8B5CF6');h+='<div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:var(--rs);font-size:11px;color:var(--tsec);line-height:1.8"><strong>判定理由：</strong>';if(d.bSum>=77)h+='B（'+d.bSum+'）≧ 77 → パターン1該当';else if((d.aSum+d.cSum)>=76&&d.bSum>=63)h+='A+C（'+(d.aSum+d.cSum)+'）≧ 76 かつ B（'+d.bSum+'）≧ 63 → パターン2該当';else h+='いずれの基準にも非該当';h+='</div></div>';h+='<div class="card"><div class="card-h"><span class="card-t">過去の回答履歴</span></div><div id="hist"><button class="btn bs2 bp" onclick="lhist(\''+d.name.replace(/'/g,"\\'")+'\')">履歴を表示</button></div></div>';h+=asec('A — あなたの仕事について',d.aSum,68,'A',17,qAL,aA,d.answers);h+=asec('B — 最近1か月の状態',d.bSum,116,'B',29,qBL,aB,d.answers);h+=asec('C — 周りの方々について',d.cSum,36,'C',9,qCL,aC,d.answers);h+=asec('D — 満足度',d.dSum,8,'D',2,qDL,aD,d.answers);dv.innerHTML=h;});}
function sb(l,v,mx,c){var p=Math.round(v/mx*100);return '<div class="sbar"><span class="sl">'+l+'</span><div class="sw"><div class="sf" style="width:'+p+'%;background:'+c+'"></div></div><span class="sv">'+v+'</span></div>';}
function asec(t,s,mx,pf,cnt,ql,al,ans){var h='<div class="card"><div class="card-h"><span class="card-t">'+t+'</span><span class="card-st">'+s+' / '+mx+'</span></div>';for(var i=1;i<=cnt;i++){var v=ans[pf+i]||0;var tx=al[v]||'未回答';var bg=v<=1?'var(--okL)':v===2?'var(--priL)':v===3?'var(--warnL)':'var(--ngL)';var fg=v<=1?'var(--ok)':v===2?'var(--pri)':v===3?'var(--warn)':'var(--ng)';h+='<div class="dqr"><span class="dqn">'+pf+i+'</span><span class="dqt">'+ql[i-1]+'</span><span class="dqa" style="background:'+bg+';color:'+fg+'">'+tx+'</span></div>';}h+='</div>';return h;}
function bdl(){document.getElementById('dl-card').style.display='block';document.getElementById('dv').style.display='none';}
function lhist(name){document.getElementById('hist').innerHTML='<div class="ld"><i class="ti ti-loader-2"></i></div>';gGet('getStressHistory&name='+encodeURIComponent(name),function(data){if(!data.success)return;var hs=data.history;if(hs.length<=1){document.getElementById('hist').innerHTML='<p style="font-size:12px;color:var(--tsec)">過去データなし</p>';return;}var h='<table><thead><tr><th>実施日</th><th>A</th><th>B</th><th>C</th><th>D</th><th>合計</th><th>判定</th></tr></thead><tbody>';hs.forEach(function(r){var bc=r.level==='良好'?'bg':'br';var dt=r.date?String(r.date).substring(0,10):'—';h+='<tr><td>'+dt+'</td><td>'+r.aSum+'</td><td>'+r.bSum+'</td><td>'+r.cSum+'</td><td>'+r.dSum+'</td><td>'+r.total+'</td><td><span class="bs '+bc+'">'+r.level+'</span></td></tr>';});h+='</tbody></table>';if(hs.length>=2){var prev=hs[hs.length-2],cur=hs[hs.length-1];var diff=cur.total-prev.total;var ar=diff>0?'↑ +'+diff:diff<0?'↓ '+diff:'→ 変動なし';var cl=diff>0?'var(--ng)':diff<0?'var(--ok)':'var(--tsec)';h+='<div style="margin-top:10px;padding:10px;background:var(--bg);border-radius:var(--rs);font-size:12px">前回比: <strong style="color:'+cl+'">'+ar+'</strong></div>';}document.getElementById('hist').innerHTML=h;});}
// HEALTH
function loadHL(){document.getElementById('hl-card').style.display='block';document.getElementById('hl-pdf').style.display='none';document.getElementById('hl-tbl').innerHTML='<div class="ld"><i class="ti ti-loader-2"></i></div>';gGet('getHealthRecords',function(d){if(!d.success)return;hlD=d.records;renderHL();});}
function fHL(f,el){document.querySelectorAll('#p-health .fb').forEach(function(b){b.classList.remove('on');});el.classList.add('on');if(f==='dept'){document.getElementById('hl-dept').style.display='block';}else{document.getElementById('hl-dept').style.display='none';document.getElementById('hl-dept-sel').value='';}renderHL();}
function renderHL(){var rs=hlD;var dept=document.getElementById('hl-dept-sel').value;if(dept)rs=rs.filter(function(r){return r.dept===dept;});if(!rs.length){document.getElementById('hl-tbl').innerHTML='<p style="color:var(--tsec);font-size:12px;padding:.5rem">該当なし</p>';return;}var h='<table><thead><tr><th>提出日</th><th>氏名</th><th>部署</th><th>ファイル</th><th></th></tr></thead><tbody>';rs.forEach(function(r){var dt=r.date?String(r.date).substring(0,10):'—';h+='<tr><td>'+dt+'</td><td>'+r.name+'</td><td>'+r.dept+'</td><td>'+r.fileName+'</td><td><button class="btn bs2 bp bi" onclick="vpdf(\''+r.fileId+"','"+r.name.replace(/'/g,"\\'")+"')\"><i class=\"ti ti-file-text\" style=\"font-size:12px\"></i>PDF表示</button></td></tr>";});h+='</tbody></table>';document.getElementById('hl-tbl').innerHTML=h;}
function vpdf(fid,name){document.getElementById('hl-card').style.display='none';var pv=document.getElementById('hl-pdf');pv.style.display='block';pv.innerHTML='<div class="ld"><i class="ti ti-loader-2"></i></div>';gGet('getHealthFile&fileId='+fid,function(d){if(!d.success){toast('ファイル取得エラー','err');return;}pv.innerHTML='<button class="btn bs2 bi" onclick="bhl()" style="margin-bottom:1rem"><i class="ti ti-arrow-left" style="font-size:13px"></i>一覧に戻る</button><div class="card"><div class="card-h"><span class="card-t"><i class="ti ti-file-text" style="color:var(--pri)"></i> '+name+' — 健康診断結果</span></div><iframe src="'+d.url+'" class="pdf-frame"></iframe></div>';});}
function bhl(){document.getElementById('hl-card').style.display='block';document.getElementById('hl-pdf').style.display='none';}
(function(){if(GAS)loadDash();})();
</script>
